name: Build & Package (Linux)

on:
  push:
    branches: [ "chida/major_update" ]
  pull_request:
    branches: [ "chida/major_update" ]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # don't cancel other jobs if one distro fails
      matrix:
        os: [ ubuntu-20.04, ubuntu-22.04, ubuntu-24.04 ]

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install system deps needed to compile native addons ─────────────
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            python3-pip \
            libusb-1.0-0-dev \
            libudev-dev

      # ── 4. Build Node Native Addon (addon/) ────────────────────────────────
      - name: Install addon dependencies
        working-directory: addon
        run: npm ci

      - name: Build native addon
        working-directory: addon
        run: npm run build
        # node-gyp compiles wraperfunction.node into addon/build/Release/

      # ── 5. Copy wraperfunction.node → electron/ ────────────────────────────
      - name: Copy wraperfunction.node into electron
        run: |
          # node-gyp outputs to addon/build/Release/ by default
          ADDON_FILE="addon/build/Release/wraperfunction.node"

          if [ ! -f "$ADDON_FILE" ]; then
            echo "wraperfunction.node not found at $ADDON_FILE"
            echo "Searching for .node files in addon/build/:"
            find addon/build -name "*.node" 2>/dev/null || echo "No .node files found"
            exit 1
          fi

          # Change the destination path below if electron expects it elsewhere
          mkdir -p electron/addons
          cp "$ADDON_FILE" electron/addons/wraperfunction.node
          echo "wraperfunction.node copied to electron/addons/"

      # ── 6. Build React Frontend (frontend/) ───────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        run: npm run build
        # Vite  → frontend/dist
        # CRA   → frontend/build

      # ── 7. Copy React build → electron/ ───────────────────────────────────
      - name: Copy React build into electron
        run: |
          # Vite → frontend/dist  |  CRA → change to frontend/build
          rm -rf electron/dist
          cp -r frontend/dist electron/dist
          echo "React build copied to electron/dist"

      # ── 8. Install Electron dependencies ──────────────────────────────────
      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      # ── 9. Build & Package Electron app ───────────────────────────────────
      - name: Build Electron app (Linux)
        working-directory: electron
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Upload per-distro artifact ────────────────────────────────────
      - name: Upload Electron Linux build
        uses: actions/upload-artifact@v4
        with:
          # artifact name includes the distro so each matrix job uploads separately
          name: electron-build-${{ matrix.os }}
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/*.rpm
            electron/out/make/**/*
          if-no-files-found: warn
          retention-days: 7
