name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"  
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
    actions: write
    contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            artifact_name: linux-ubuntu22

          - os: ubuntu-24.04
            platform: linux
            artifact_name: linux-ubuntu24

          - os: windows-latest
            platform: windows
            artifact_name: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. OS dependencies ──────────────────────────────────────
      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            libusb-1.0-0-dev \
            libudev-dev \
            upx-ucl

      - name: Install Windows deps
        if: matrix.platform == 'windows'
        shell: pwsh
        run: npm install -g node-gyp

      # ════════════════════════════════════════════════════════════
      # STEP A: Native addon
      # ════════════════════════════════════════════════════════════
      - name: addon — install
        working-directory: addon
        run: npm i

      - name: addon — configure
        working-directory: addon
        run: npx node-gyp configure

      - name: addon — build
        working-directory: addon
        run: npx node-gyp build

      - name: Copy .node → electron (Linux)
        if: matrix.platform == 'linux'
        run: cp addon/build/Release/wraperfunction.node electron/wraperfunction.node

      - name: Copy .node → electron (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Copy-Item addon\build\Release\wraperfunction.node electron\wraperfunction.node

      # ════════════════════════════════════════════════════════════
      # STEP B: Frontend
      # ════════════════════════════════════════════════════════════
      - name: frontend — install
        working-directory: frontend
        run: npm i

      - name: frontend — build
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          GENERATE_SOURCEMAP: false
          CI: false

      - name: Copy React → electron (Linux)
        if: matrix.platform == 'linux'
        run: |
          rm -rf electron/build
          cp -r frontend/build electron/build

      - name: Copy React → electron (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (Test-Path electron\build) { Remove-Item -Recurse -Force electron\build }
          Copy-Item -Recurse frontend\build electron\build

      # ════════════════════════════════════════════════════════════
      # STEP C: Electron build
      # ════════════════════════════════════════════════════════════
      - name: electron — install
        working-directory: electron
        run: npm i

      - name: electron — build Windows
        if: matrix.platform == 'windows'
        working-directory: electron
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: electron — build Linux
        if: matrix.platform == 'linux'
        working-directory: electron
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      # ════════════════════════════════════════════════════════════
      # 🔥 Delete OLD artifacts (same name)
      # ════════════════════════════════════════════════════════════
      - name: Delete previous artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = "${{ matrix.artifact_name }}";

            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const matches = data.artifacts.filter(a => a.name === artifactName);

            for (const artifact of matches) {
              core.info(`Deleting ${artifact.name} (ID: ${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }

      # ── Upload artifact ─────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            electron/dist/*.exe
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/latest*.yml
          if-no-files-found: warn
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 90 || 7 }}

      # ── GitHub Release (permanent storage) ──────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.exe
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
